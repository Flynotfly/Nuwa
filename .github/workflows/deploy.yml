name: Deploy to production

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'master'
        type: branch

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Determine new version
        id: version
        run: |
          if [ -f VERSION ]; then
              base_version=$(cat VERSION)
          else
              echo "VERSION file not found"
              exit 1
          fi
          echo "Base version: $base_version"
          latest=$(git tag --list "v${base_version}.*" --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
              new_version="v${base_version}.0"
          else
              patch=$(echo "$latest" | awk -F. '{print $3}')
              new_patch=$((patch+1))
              new_version="v${base_version}.${new_patch}"
          fi
          echo "new_version=$new_version" >> $GITHUB_OUTPUT

  build-web:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v3
        with:
          context: nuwa
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nuwa:${{ needs.version.outputs.new_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-nginx:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: Nginx.Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nuwa-nginx:${{ needs.version.outputs.new_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-web, build-nginx, version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Create and push git tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.version.outputs.new_version }}
          git push origin ${{ needs.version.outputs.new_version }}

      - name: Create .env file
        run: |
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
          echo "DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" >> .env
          echo "JWT_SIGNING_KEY=${{ secrets.JWT_SIGNING_KEY }}" >> .env
          echo "OLLAMA_API_KEY=${{ secrets.OLLAMA_API_KEY }}" >> .env
          echo "OPENROUTER_KEY=${{ secrets.OPENROUTER_KEY }}" >> .env
          echo "TAG=${{ needs.version.outputs.new_version }}" >> .env
          cat .env

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Create remote directories
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
          "mkdir -p ~/water-tracker/config/uwsgi"

      - name: Upload files to server
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/nuwa/
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" .env ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/nuwa/
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" config/uwsgi/uwsgi.ini ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/nuwa/config/uwsgi/

      - name: Deploy new version
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd ~/nuwa
            docker compose pull
            docker compose up -d
          EOF
          
      - name: Delete previous Docker images
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            current_version="${{ needs.version.outputs.new_version }}"
            echo "Deleting old gymstat-web images..."
            docker images --format "{{.Repository}}:{{.Tag}} {{.ID}}" | grep "${{ secrets.DOCKERHUB_USERNAME }}/nuwa" | grep -v "$current_version" | awk '{print $2}' | xargs -r docker rmi -f || true
            echo "Deleting old gymstat-nginx images..."
            docker images --format "{{.Repository}}:{{.Tag}} {{.ID}}" | grep "${{ secrets.DOCKERHUB_USERNAME }}/nuwa-nginx" | grep -v "$current_version" | awk '{print $2}' | xargs -r docker rmi -f || true
          EOF