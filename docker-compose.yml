services:
    db:
        image: postgres:18.1-alpine3.23
        restart: always
        volumes:
            - ./data/db:/var/lib/postgres/data
        environment:
            - POSTGRES_DB=postgres
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
    rabbitmq:
        image: rabbitmq:4.2.3-management
        restart: always
    web:
        image: ${DOCKERHUB_USERNAME}/nuwa:${TAG}
        command: ["uv", "run", "--no-sync", "uwsgi", "--ini", "/code/config/uwsgi/uwsgi.ini"]
        restart: always
        volumes:
            - ./config/uwsgi:/code/config/uwsgi
            - uwsgi_socket:/run/uwsgi
            - static_volume:/code/static
            - media_volume:/code/media
        env_file:
            - .env
        environment:
            - ROLE=web
            - DJANGO_SETTINGS_MODULE=nuwa.settings.prod
            - POSTGRES_DB=postgres
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
            - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
        depends_on:
            - db
            - rabbitmq
    celery_worker:
        image: ${DOCKERHUB_USERNAME}/nuwa:${TAG}
        command: ["uv", "run", "--no-sync", "celery", "-A", "nuwa", "worker", "-l", "warning"]
        restart: always
        env_file:
            - .env
        environment:
            - ROLE=celery
            - DJANGO_SETTINGS_MODULE=nuwa.settings.prod
            - POSTGRES_DB=postgres
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
            - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
        depends_on:
            - db
            - rabbitmq
    celery_beat:
        image: ${DOCKERHUB_USERNAME}/nuwa:${TAG}
        command: ["uv", "run", "--no-sync", "celery", "-A", "nuwa", "beat", "-l", "warning"]
        restart: always
        env_file:
            - .env
        environment:
            - ROLE=celery
            - DJANGO_SETTINGS_MODULE=nuwa.settings.prod
            - POSTGRES_DB=postgres
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
            - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
        depends_on:
            - db
            - rabbitmq
        
    nginx:
        image: ${DOCKERHUB_USERNAME}/nuwa-nginx:${TAG}
        restart: always
        volumes:
            - uwsgi_socket:/run/uwsgi:ro
            - static_volume:/code/static:ro
            - media_volume:/code/media:ro
            - /etc/letsencrypt:/etc/letsencrypt:ro
        ports:
            - "80:80"
            - "443:443"
        depends_on:
            - web
volumes:
    uwsgi_socket:
    static_volume:
    media_volume: